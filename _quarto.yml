project:
  type: website
  output-dir: _site

website:
  title: "ERSeLab"   # can still exist for metadata/browser title
  site-url: "https://erselab.github.io"
  # A concise description shown in metadata and social previews
  description: "Advancing atmospheric remote sensing and carbon-cycle science through satellite data, inverse modelling and open tools."

  navbar:
    logo: assets/img/ersla_logo.png
    logo-alt: "ERSELab"
    left:
      - href: index.qmd
        text: Home
      - href: research/index.qmd
        text: Research
      - href: people/index.qmd
        text: Team
      - href: publications.qmd
        text: Publications
      - href: contact.qmd
        text: Contact
    right:
      # Replace GitHub placeholder with the user’s actual GitHub profile when known
      - icon: github
        href: https://github.com/erselab
        aria-label: GitHub
  # enable search box in the header
  search: true
  # simple footer with copyright and accessibility link
  page-footer:
    left: "© {year} Environmental Remote Sensing Lab"
    right:
      - text: "Accessibility"
        href: accessibility.qmd

format:
  html:
    theme: superhero
    css: styles.css
    toc: true
    smooth-scroll: true

resources:
  - analyze_insitu.html
  - toy_retrieval.html
  - absorption_forward_model_comparison.html

execute:
  freeze: auto

